<svg width="800" height="12" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0" />
      <stop offset="25%" stop-color="#c084fc" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#e9d5ff" stop-opacity="1" />
      <stop offset="75%" stop-color="#c084fc" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="5" width="100%" height="2" fill="url(#grad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3; 1; 0.3" dur="2.5s" repeatCount="indefinite" />
  </rect>
</svg>
