<svg width="800" height="12" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7e22ce" stop-opacity="0" />
      <stop offset="25%" stop-color="#7e22ce" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.7" />
      <stop offset="75%" stop-color="#7e22ce" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="5" width="100%" height="1.5" fill="url(#grad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.2; 0.8; 0.2" dur="3s" repeatCount="indefinite" />
  </rect>
</svg>
