name: Get Trophies

on:
  schedule:
    # Run once a day at midnight
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trophies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Trophies SVG
        run: |
          mkdir -p .github/assets
          curl -f -o .github/assets/trophies.svg "https://github-profile-trophy.vercel.app/?username=AnshXGrind&theme=radical&no-frame=true&no-bg=true&margin-w=8&rank=SECRET,SSS,SS,S,AAA,AA,A,B" || echo "Failed to fetch trophies. API might be paused."

      - name: Commit and Push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/assets/trophies.svg
          git commit -m "chore: update trophies [skip ci]" || echo "No changes to commit"
          git push
