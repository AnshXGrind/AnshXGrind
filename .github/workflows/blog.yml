name: Latest Blog Posts
on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          # Replace this with your actual RSS feed URL (Medium, Dev.to, Hashnode, etc.)
          # Example for Medium: https://medium.com/feed/@your_username
          feed_list: "https://dev.to/feed/AnshXGrind"
